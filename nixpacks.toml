# Shared nixpacks config for all Railway services (Node workers + Python microservices).
# Node workers use npm ci; Python services use gunicorn (installed via pip).
# When py-* services are migrated to their own Root Directories (deploy/py-*/),
# this file's Python entries become redundant but harmless.

[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = [
  "npm ci",
  # `pip` bare command is not on PATH under nix python; use the module form.
  # `|| true` keeps Node worker builds green even if the Python deps step fails —
  # only the py-* services actually need these packages at runtime.
  "python3 -m pip install --break-system-packages --no-cache-dir -r src/services/requirements.txt || true",
]
